# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "ee0f8b1cc6e2ec5052d6b54358c4355e"
name = "automail"
application_url = "https://automail-vc6z.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[access_scopes]
scopes = "write_products,write_metaobjects,write_metaobject_definitions,read_orders,read_all_orders,read_customers,read_fulfillments"

[auth]
redirect_urls = [
  "https://automail-vc6z.onrender.com/auth/callback",
  "https://automail-vc6z.onrender.com/auth/tokens/callback",
]
